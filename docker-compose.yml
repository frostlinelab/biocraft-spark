services:
  web:
    build: .
    container_name: biocraft-spark-web
    ports:
      - "25568:25568"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      # Docker bind mounts are resolved by the host daemon, not this container.
      BIOCRAFT_DOCKER_HOST_PROJECT_DIR: ${PWD}
    command: python manage.py runserver 0.0.0.0:25568
