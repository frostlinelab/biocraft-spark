services:
  web:
    # Pre-built image from GHCR (pulled by default).
    # Falls back to `build: .` when the image is not available or `--build` is used.
    image: ghcr.io/frostlinelab/biocraft-spark:latest
    build: .
    container_name: biocraft-spark-web
    ports:
      - "25568:25568"
    volumes:
      # Docker socket — lets the runtime spawn sibling containers (Docker-out-of-Docker).
      # DOCKER_SOCK is auto-detected by install.sh (Linux/Docker Desktop/OrbStack);
      # defaults to the standard path so manual `docker compose up` still works.
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      # Persistent data (selective bind mounts — image code/frontend stays self-contained)
      - ./uploads:/app/uploads
      - ./plugins:/app/plugins
      - ./run_outputs:/app/run_outputs
      - ./db.sqlite3:/app/db.sqlite3
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      # Docker bind mounts are resolved by the host daemon, not this container.
      BIOCRAFT_DOCKER_HOST_PROJECT_DIR: ${PWD}
    command: python manage.py runserver 0.0.0.0:25568
